<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoTik 达人库导出助手</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #172021;
      background: #ffffff;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #0b8f86;
    }
    p {
      margin: 0 0 12px;
      color: #6d7a78;
      font-size: 13px;
      line-height: 1.5;
    }
    .steps {
      margin: 0 0 12px;
      padding-left: 18px;
      color: #263331;
      font-size: 13px;
      line-height: 1.6;
    }
    .tip {
      padding: 10px;
      border-radius: 8px;
      background: #f0f9f7;
      color: #0b8f86;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>EchoTik 导出助手</h1>
  <p>在 EchoTik 达人库页面自动捕获列表数据，支持一键导出 JSON/CSV。</p>
  <ol class="steps">
    <li>打开 <strong>echotik.live/influencers</strong></li>
    <li>设置筛选条件（性别、粉丝画像、邮箱等）</li>
    <li>页面翻页时数据会自动累计</li>
    <li>点击右下角面板导出</li>
  </ol>
  <div class="tip">所有数据只在你的浏览器内处理，不会上传到任何服务器。</div>
</body>
</html>
